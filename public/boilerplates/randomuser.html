<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RandomTeam Directory</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .user-card { transition: all 0.3s ease; }
        .user-card:hover { border-color: #6366f1; box-shadow: 0 10px 25px -5px rgba(99, 102, 241, 0.1), 0 8px 10px -6px rgba(99, 102, 241, 0.1); }
        [v-cloak] { display: none; }
    </style>
</head>
<body class="bg-[#fafafa] text-gray-900">
    <div id="app" v-cloak class="min-h-screen">
        <!-- Hero Section -->
        <div class="bg-indigo-600 py-20 px-6">
            <div class="max-w-6xl mx-auto text-center">
                <h1 class="text-4xl md:text-5xl font-extrabold text-white mb-6">Meet our global team</h1>
                <p class="text-indigo-100 text-lg max-w-2xl mx-auto mb-10">We're a distributed team of engineers, designers, and mock data enthusiasts working from all over the world.</p>
                <div class="flex justify-center gap-4">
                    <button @click="fetchUsers" class="bg-white text-indigo-600 px-8 py-3 rounded-full font-bold hover:bg-indigo-50 transition-colors shadow-lg">Refresh Team</button>
                    <button class="bg-indigo-500 text-white px-8 py-3 rounded-full font-bold hover:bg-indigo-400 transition-colors">Join Us</button>
                </div>
            </div>
        </div>

        <!-- Filter Bar -->
        <div class="max-w-6xl mx-auto px-6 -mt-8">
            <div class="bg-white p-4 rounded-2xl shadow-xl border border-gray-100 flex flex-col md:flex-row gap-4 items-center">
                <div class="relative flex-1 w-full">
                    <svg class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                    <input type="text" v-model="search" placeholder="Search by name or country..." class="w-full pl-12 pr-4 py-3 bg-gray-50 border-transparent rounded-xl focus:bg-white focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
                </div>
                <div class="flex gap-2 w-full md:w-auto">
                    <select v-model="gender" @change="fetchUsers" class="flex-1 md:w-40 px-4 py-3 bg-gray-50 border-transparent rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none cursor-pointer">
                        <option value="">All Genders</option>
                        <option value="male">Male</option>
                        <option value="female">Female</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Grid -->
        <main class="max-w-6xl mx-auto px-6 py-16">
            <div v-if="loading" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
                <div v-for="i in 8" :key="i" class="h-80 bg-gray-100 rounded-3xl animate-pulse"></div>
            </div>

            <div v-else class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
                <div v-for="user in filteredUsers" :key="user.login.uuid" class="user-card bg-white p-6 rounded-[32px] border border-gray-100 flex flex-col items-center text-center">
                    <div class="relative mb-6">
                        <img :src="user.picture.large" :alt="user.name.first" class="w-32 h-32 rounded-full border-4 border-indigo-50 p-1">
                        <div class="absolute bottom-1 right-1 w-6 h-6 bg-green-500 border-4 border-white rounded-full"></div>
                    </div>
                    
                    <h3 class="text-xl font-bold mb-1">{{ user.name.first }} {{ user.name.last }}</h3>
                    <p class="text-indigo-600 font-semibold text-sm mb-4">{{ user.location.city }}, {{ user.location.country }}</p>
                    
                    <div class="w-full space-y-3 mb-6">
                        <div class="flex items-center justify-center gap-2 text-gray-500 text-sm">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                            <span class="truncate">{{ user.email }}</span>
                        </div>
                        <div class="flex items-center justify-center gap-2 text-gray-500 text-sm">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path></svg>
                            <span>{{ user.phone }}</span>
                        </div>
                    </div>

                    <div class="flex gap-3 mt-auto">
                        <button class="w-10 h-10 rounded-full bg-gray-50 flex items-center justify-center text-gray-400 hover:bg-indigo-50 hover:text-indigo-600 transition-colors">
                            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.761 0 5-2.239 5-5v-14c0-2.761-2.239-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z"/></svg>
                        </button>
                        <button class="w-10 h-10 rounded-full bg-gray-50 flex items-center justify-center text-gray-400 hover:bg-indigo-50 hover:text-indigo-600 transition-colors">
                            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M23.953 4.57a10 10 0 01-2.825.775 4.958 4.958 0 002.163-2.723c-.951.555-2.005.959-3.127 1.184a4.92 4.92 0 00-8.384 4.482C7.69 8.095 4.067 6.13 1.64 3.162a4.822 4.822 0 00-.666 2.475c0 1.71.87 3.213 2.188 4.096a4.904 4.904 0 01-2.228-.616v.06a4.923 4.923 0 003.946 4.84 4.996 4.996 0 01-2.212.085 4.936 4.936 0 004.604 3.417 9.867 9.867 0 01-6.102 2.105c-.39 0-.779-.023-1.17-.067a13.995 13.995 0 007.557 2.209c9.053 0 13.998-7.496 13.998-13.985 0-.21 0-.42-.015-.63A9.935 9.935 0 0024 4.59z"/></svg>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const { createApp, ref, onMounted, computed } = Vue;

        createApp({
            setup() {
                const users = ref([]);
                const loading = ref(true);
                const search = ref('');
                const gender = ref('');

                const fetchUsers = async () => {
                    loading.value = true;
                    try {
                        const url = `https://randomuser.me/api/?results=12&gender=${gender.value}`;
                        const res = await fetch(url);
                        const data = await res.json();
                        users.value = data.results;
                    } catch (e) {
                        console.error(e);
                    } finally {
                        loading.value = false;
                    }
                };

                const filteredUsers = computed(() => {
                    return users.value.filter(u => {
                        const fullName = `${u.name.first} ${u.name.last}`.toLowerCase();
                        const country = u.location.country.toLowerCase();
                        const q = search.value.toLowerCase();
                        return fullName.includes(q) || country.includes(q);
                    });
                });

                onMounted(fetchUsers);

                return {
                    users,
                    loading,
                    search,
                    gender,
                    fetchUsers,
                    filteredUsers
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
