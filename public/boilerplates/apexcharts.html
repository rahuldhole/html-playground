<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ApexCharts Interactive Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" href="https://cdn.jsdelivr.net/npm/simple-icons@v9/icons/apexcharts.svg">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-[#fcfcfd] text-slate-900 min-h-screen p-6">
    <div class="max-w-6xl mx-auto space-y-8">
        
        <header class="flex items-center justify-between">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-indigo-600 rounded-2xl flex items-center justify-center shadow-lg shadow-indigo-100">
                    <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
                </div>
                <div>
                    <h1 class="text-2xl font-bold tracking-tight">Apex Analytics</h1>
                    <p class="text-sm text-slate-400 font-medium">Real-time performance monitoring</p>
                </div>
            </div>
            <div class="flex gap-2 bg-white p-1 rounded-xl shadow-sm border border-slate-100">
                <button class="px-4 py-1.5 bg-slate-50 text-slate-900 rounded-lg text-sm font-bold shadow-sm">Overview</button>
                <button class="px-4 py-1.5 text-slate-400 hover:text-slate-600 rounded-lg text-sm font-bold transition">Reports</button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- Main Area Chart -->
            <div class="lg:col-span-2 bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-100">
                <div class="flex items-center justify-between mb-8">
                    <div>
                        <h2 class="text-lg font-bold">Revenue Growth</h2>
                        <p class="text-sm text-green-500 font-bold">+12.5% vs last month</p>
                    </div>
                </div>
                <div id="area-chart"></div>
            </div>

            <!-- Radial Chart -->
            <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-100 flex flex-col items-center justify-center">
                <h2 class="text-lg font-bold mb-4">Goal Progress</h2>
                <div id="radial-chart"></div>
                <p class="text-sm text-slate-400 text-center mt-4">You are on track to reach your monthly target of <span class="font-bold text-slate-900">$50,000</span></p>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-indigo-600 p-6 rounded-[2rem] text-white space-y-4 shadow-xl shadow-indigo-100">
                <p class="text-indigo-200 text-sm font-bold uppercase tracking-widest">Active Users</p>
                <h3 class="text-4xl font-bold">2,482</h3>
                <div class="flex items-center gap-2 text-indigo-200 text-xs font-bold">
                    <span class="p-1 bg-white/20 rounded-lg">
                        <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M12 7a1 1 0 110-2h5a1 1 0 011 1v5a1 1 0 11-2 0V8.414l-4.293 4.293a1 1 0 01-1.414 0L8 10.414l-4.293 4.293a1 1 0 01-1.414-1.414l5-5a1 1 0 011.414 0L11 10.586 14.586 7H12z" clip-rule="evenodd"></path></svg>
                    </span>
                    15% increase
                </div>
            </div>
            <div class="bg-white p-6 rounded-[2rem] border border-slate-100 space-y-4">
                <p class="text-slate-400 text-sm font-bold uppercase tracking-widest">Avg Session</p>
                <h3 class="text-4xl font-bold">04:32</h3>
                <p id="chart-sparkline" class="h-12 w-full"></p>
            </div>
            <div class="bg-white p-6 rounded-[2rem] border border-slate-100 space-y-4">
                <p class="text-slate-400 text-sm font-bold uppercase tracking-widest">Bounce Rate</p>
                <h3 class="text-4xl font-bold">24.8%</h3>
                <div class="flex gap-1 h-2 bg-slate-100 rounded-full overflow-hidden">
                    <div class="w-[24%] bg-indigo-500 rounded-full"></div>
                </div>
            </div>
        </div>

    </div>

    <script>
        // Area Chart
        const areaOptions = {
            series: [{
                name: 'Revenue',
                data: [31, 40, 28, 51, 42, 109, 100]
            }, {
                name: 'Expenses',
                data: [11, 32, 45, 32, 34, 52, 41]
            }],
            chart: {
                height: 350,
                type: 'area',
                toolbar: { show: false },
                fontFamily: 'Plus Jakarta Sans'
            },
            dataLabels: { enabled: false },
            stroke: { curve: 'smooth', width: 3 },
            colors: ['#4f46e5', '#94a3b8'],
            fill: {
                type: 'gradient',
                gradient: {
                    shadeIntensity: 1,
                    opacityFrom: 0.45,
                    opacityTo: 0.05,
                    stops: [20, 100, 100, 100]
                }
            },
            xaxis: {
                categories: ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"],
                axisBorder: { show: false },
                axisTicks: { show: false }
            },
            grid: {
                borderColor: '#f1f5f9',
                strokeDashArray: 4
            },
            tooltip: { x: { format: 'dd/MM/yy HH:mm' } }
        };

        const areaChart = new ApexCharts(document.querySelector("#area-chart"), areaOptions);
        areaChart.render();

        // Radial Chart
        const radialOptions = {
            series: [76],
            chart: {
                height: 250,
                type: 'radialBar',
            },
            plotOptions: {
                radialBar: {
                    hollow: { size: '70%' },
                    track: { background: '#f1f5f9' },
                    dataLabels: {
                        name: { show: false },
                        value: {
                            offsetY: 10,
                            fontSize: '32px',
                            fontWeight: '700',
                            color: '#1e293b'
                        }
                    }
                }
            },
            colors: ['#4f46e5'],
            stroke: { lineCap: 'round' }
        };

        const radialChart = new ApexCharts(document.querySelector("#radial-chart"), radialOptions);
        radialChart.render();
    </script>
</body>
</html>
