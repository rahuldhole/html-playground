<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feather Icons Showcase</title>
    <link rel="icon" href="https://cdn.jsdelivr.net/npm/simple-icons@v9/icons/feathericons.svg">
    <script src="https://unpkg.com/feather-icons/dist/feather.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .icon-card:hover i { transform: scale(1.1); color: #3b82f6; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen p-8">
    <div class="max-w-4xl mx-auto space-y-12">
        
        <header class="text-center space-y-4">
            <div class="inline-flex items-center justify-center p-3 bg-blue-600 text-white rounded-2xl shadow-lg shadow-blue-200 mb-4">
                <i data-feather="feather" class="w-8 h-8"></i>
            </div>
            <h1 class="text-4xl font-bold tracking-tight">Feather Icons</h1>
            <p class="text-slate-500 text-lg max-w-xl mx-auto">Simply beautiful open source icons. Each icon is designed on a 24x24 grid with an emphasis on simplicity, consistency, and flexibility.</p>
        </header>

        <!-- Categories -->
        <section class="grid grid-cols-2 md:grid-cols-4 gap-4">
            <div class="icon-card bg-white p-6 rounded-2xl border border-slate-100 shadow-sm transition-all hover:shadow-md flex flex-col items-center gap-3">
                <i data-feather="home" class="w-6 h-6 transition-transform"></i>
                <span class="text-xs font-medium text-slate-400 uppercase tracking-wider">Home</span>
            </div>
            <div class="icon-card bg-white p-6 rounded-2xl border border-slate-100 shadow-sm transition-all hover:shadow-md flex flex-col items-center gap-3">
                <i data-feather="user" class="w-6 h-6 transition-transform"></i>
                <span class="text-xs font-medium text-slate-400 uppercase tracking-wider">User</span>
            </div>
            <div class="icon-card bg-white p-6 rounded-2xl border border-slate-100 shadow-sm transition-all hover:shadow-md flex flex-col items-center gap-3">
                <i data-feather="settings" class="w-6 h-6 transition-transform"></i>
                <span class="text-xs font-medium text-slate-400 uppercase tracking-wider">Settings</span>
            </div>
            <div class="icon-card bg-white p-6 rounded-2xl border border-slate-100 shadow-sm transition-all hover:shadow-md flex flex-col items-center gap-3">
                <i data-feather="bell" class="w-6 h-6 transition-transform"></i>
                <span class="text-xs font-medium text-slate-400 uppercase tracking-wider">Notifications</span>
            </div>
        </section>

        <!-- Customization -->
        <section class="bg-white p-8 rounded-3xl border border-slate-100 shadow-sm space-y-8">
            <h2 class="text-2xl font-bold">Customization</h2>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-12">
                <div class="space-y-4">
                    <h3 class="text-sm font-semibold text-slate-400 uppercase tracking-widest">Sizes</h3>
                    <div class="flex items-end gap-6 text-blue-600">
                        <i data-feather="heart" class="w-4 h-4"></i>
                        <i data-feather="heart" class="w-6 h-6"></i>
                        <i data-feather="heart" class="w-8 h-8"></i>
                        <i data-feather="heart" class="w-12 h-12"></i>
                    </div>
                </div>
                
                <div class="space-y-4">
                    <h3 class="text-sm font-semibold text-slate-400 uppercase tracking-widest">Stroke Width</h3>
                    <div class="flex items-center gap-6 text-indigo-600">
                        <i data-feather="activity" stroke-width="1"></i>
                        <i data-feather="activity" stroke-width="2"></i>
                        <i data-feather="activity" stroke-width="3"></i>
                    </div>
                </div>
            </div>
        </section>

        <!-- Dynamic Replacement -->
        <footer class="text-center">
            <div class="inline-block bg-slate-900 text-slate-400 px-6 py-3 rounded-full text-sm font-mono">
                feather.replace()
            </div>
            <p class="mt-4 text-slate-400 text-sm">Call replace() to render all data-feather attributes</p>
        </footer>

    </div>

    <script>
        feather.replace();
    </script>
</body>
</html>
