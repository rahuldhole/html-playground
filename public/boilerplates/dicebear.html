<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DiceBear Avatar Lab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Space Grotesk', sans-serif; }
        .avatar-preview { transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .avatar-preview:hover { transform: rotate(5deg) scale(1.1); }
        [v-cloak] { display: none; }
    </style>
</head>
<body class="bg-indigo-50 min-h-screen text-indigo-950">
    <div id="app" v-cloak class="max-w-4xl mx-auto px-6 py-12 md:py-20">
        <header class="text-center mb-16">
            <h1 class="text-4xl md:text-6xl font-black mb-4 tracking-tight">Avatar<span class="text-indigo-600">Lab</span></h1>
            <p class="text-indigo-600/60 font-medium text-lg">Generate unique SVG avatars using DiceBear API.</p>
        </header>

        <div class="grid md:grid-cols-2 gap-12 items-center">
            <!-- Left: Generator Controls -->
            <div class="bg-white p-8 md:p-10 rounded-[40px] shadow-2xl shadow-indigo-200/50 border border-indigo-100">
                <div class="space-y-8">
                    <div>
                        <label class="block text-sm font-bold uppercase tracking-widest text-indigo-300 mb-4">Choose Style</label>
                        <div class="grid grid-cols-3 gap-2">
                            <button v-for="s in styles" :key="s" 
                                @click="style = s"
                                :class="style === s ? 'bg-indigo-600 text-white' : 'bg-indigo-50 text-indigo-400 hover:bg-indigo-100'"
                                class="px-3 py-2 rounded-xl text-[10px] font-bold uppercase transition-all">
                                {{ s }}
                            </button>
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-bold uppercase tracking-widest text-indigo-300 mb-4">Avatar Seed</label>
                        <div class="flex gap-3">
                            <input type="text" v-model="seed" placeholder="Type anything..." 
                                class="flex-1 bg-indigo-50 border-2 border-transparent focus:border-indigo-600 rounded-2xl px-5 py-3 outline-none font-bold transition-all">
                            <button @click="randomize" class="bg-indigo-600 text-white p-4 rounded-2xl hover:bg-indigo-700 transition-colors shadow-lg shadow-indigo-200">
                                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                            </button>
                        </div>
                        <p class="mt-3 text-xs text-indigo-300 font-medium">Changing the seed will generate a unique avatar.</p>
                    </div>

                    <div class="pt-4">
                        <button @click="download" class="w-full bg-indigo-950 text-white py-5 rounded-3xl font-black text-lg hover:bg-indigo-900 transition-all flex items-center justify-center gap-3">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                            Export SVG
                        </button>
                    </div>
                </div>
            </div>

            <!-- Right: Preview -->
            <div class="flex flex-col items-center">
                <div class="relative group">
                    <div class="absolute inset-0 bg-indigo-400 blur-[80px] opacity-20 group-hover:opacity-40 transition-opacity"></div>
                    <div class="avatar-preview relative w-64 h-64 md:w-80 md:h-80 bg-white rounded-[60px] p-8 shadow-2xl border-4 border-white overflow-hidden">
                        <img :src="avatarUrl" class="w-full h-full" alt="Generated Avatar">
                    </div>
                </div>
                
                <div class="mt-12 flex gap-4">
                    <div class="bg-white/50 backdrop-blur px-6 py-3 rounded-2xl border border-indigo-100 flex items-center gap-3">
                        <div class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
                        <span class="text-sm font-bold text-indigo-400">Live Preview</span>
                    </div>
                </div>
            </div>
        </div>

        <footer class="mt-32 text-center">
            <p class="text-indigo-300 text-sm font-medium">Powered by DiceBear HTTP API</p>
        </footer>
    </div>

    <script>
        const { createApp, ref, computed } = Vue;

        createApp({
            setup() {
                const seed = ref('Antigravity');
                const style = ref('adventurer');
                const styles = ['adventurer', 'avataaars', 'bottts', 'fun-emoji', 'lorelei', 'notionists', 'open-peeps', 'pixel-art', 'shapes'];

                const avatarUrl = computed(() => {
                    return `https://api.dicebear.com/7.x/${style.value}/svg?seed=${encodeURIComponent(seed.value)}`;
                });

                const randomize = () => {
                    seed.value = Math.random().toString(36).substring(7);
                };

                const download = () => {
                    window.open(avatarUrl.value, '_blank');
                };

                return {
                    seed,
                    style,
                    styles,
                    avatarUrl,
                    randomize,
                    download
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
