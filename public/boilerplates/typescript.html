<!DOCTYPE html>
<html>
<head>
  <link rel="icon" type="image/svg+xml" href="https://upload.wikimedia.org/wikipedia/commons/4/4c/Typescript_logo_2020.svg">
  <script src="https://unpkg.com/typescript/lib/typescript.js"></script>
</head>
<body>

  <h2>TS Calculator</h2>

  <input id="a" placeholder="Enter A" />
  <input id="b" placeholder="Enter B" />

  <button onclick="runTS('add')">+</button>
  <button onclick="runTS('sub')">-</button>
  <button onclick="runTS('mul')">*</button>
  <button onclick="runTS('div')">/</button>

  <h3 id="result">Result: </h3>

  <script>
    function runTS(operation) {
      const tsCode = `
        const a: number = Number((document.getElementById('a') as HTMLInputElement).value)
        const b: number = Number((document.getElementById('b') as HTMLInputElement).value)

        function calculate(op: string): number {
          switch(op) {
            case 'add': return a + b
            case 'sub': return a - b
            case 'mul': return a * b
            case 'div': return b !== 0 ? a / b : NaN
            default: return 0
          }
        }

        const result = calculate("${operation}")
        document.getElementById('result')!.innerText = "Result: " + result
      `

      const jsCode = ts.transpile(tsCode)
      eval(jsCode)
    }
  </script>

</body>
</html>
