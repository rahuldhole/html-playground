<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edge AI Explorer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .loader {
      border: 3px solid #ffffff30;
      border-top: 3px solid #fff;
      border-radius: 50%;
      width: 16px;
      height: 16px;
      animation: spin 1s linear infinite;
      display: inline-block
    }

    @keyframes spin {
      to {
        transform: rotate(360deg)
      }
    }

    .grad {
      background: linear-gradient(135deg, #6366f1, #a855f7)
    }
  </style>
</head>

<body class="bg-slate-950 min-h-screen text-slate-200 font-sans">
  <div id="app" class="max-w-xl mx-auto p-6">
    <header class="flex items-center justify-between mb-8">
      <div>
        <h1 class="text-2xl font-black text-white">EDGE<span class="text-indigo-500">.AI</span></h1>
        <p class="text-slate-500 text-xs font-mono">Status: Local Execution</p>
      </div>
      <span
        :class="error?'bg-red-500/10 text-red-400 border-red-500/30':isReady?'bg-green-500/10 text-green-400 border-green-500/30':'bg-slate-800 text-slate-400 border-slate-700'"
        class="px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-widest border">
        {{error?'Failed':isReady?device.toUpperCase()+' Active':'Loading'}}
      </span>
    </header>

    <div class="mb-5">
      <label class="block text-[10px] text-slate-500 uppercase font-bold mb-2">AI Engine</label>
      <select v-model="sel" @change="sel && load()" :disabled="loading"
        class="w-full bg-slate-900 border border-slate-800 p-3 rounded-xl text-sm text-indigo-300 outline-none focus:ring-1 focus:ring-indigo-500 disabled:opacity-50">
        <option value="" disabled>— Select a model —</option>
        <optgroup v-for="g in groups" :label="g.label">
          <option v-for="m in g.models" :value="m.id">{{m.name}}</option>
        </optgroup>
      </select>
    </div>

    <div class="grid grid-cols-3 gap-3 mb-5">
      <div class="bg-slate-900 border border-slate-800 p-3 rounded-xl">
        <p class="text-[10px] text-slate-500 uppercase font-bold">Processor</p>
        <p class="text-sm text-indigo-300 truncate">{{cores}} Core CPU</p>
      </div>
      <div class="bg-slate-900 border border-slate-800 p-3 rounded-xl">
        <p class="text-[10px] text-slate-500 uppercase font-bold">Engine</p>
        <p class="text-sm text-indigo-300 capitalize truncate">{{device}}</p>
      </div>
      <div class="bg-slate-900 border border-slate-800 p-3 rounded-xl relative group">
        <p class="text-[10px] text-slate-500 uppercase font-bold">Disk Usage</p>
        <div class="flex justify-between items-center mt-0.5">
          <p class="text-sm text-indigo-300 truncate">{{storageUsed}}</p>
          <button @click="clearCache" class="opacity-0 group-hover:opacity-100 text-slate-500 hover:text-red-400 transition-all focus:opacity-100" title="Clear downloaded models">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"></path><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path></svg>
          </button>
        </div>
      </div>
    </div>

    <div v-if="loading && !error" class="mb-5">
      <div class="flex justify-between text-[11px] font-mono mb-1">
        <span class="text-slate-400 italic">{{status}}</span>
        <span class="text-indigo-400">{{pct}}%</span>
      </div>
      <div class="w-full bg-slate-900 rounded-full h-1.5 overflow-hidden">
        <div class="grad h-full transition-all duration-300" :style="{width:pct+'%'}"></div>
      </div>
    </div>

    <div v-if="error" class="mb-5 p-4 bg-red-900/20 border border-red-900 rounded-xl">
      <p class="text-red-400 text-sm font-bold mb-1">Model failed to run</p>
      <p class="text-red-400/80 text-xs font-mono">{{error}}</p>
    </div>

    <div class="bg-slate-900 border border-slate-800 rounded-2xl overflow-hidden">
      <div class="p-5">
        <textarea v-model="prompt" rows="4" :disabled="!isReady||busy"
          class="w-full bg-slate-950 border border-slate-800 p-3 rounded-xl text-white placeholder-slate-600 focus:ring-1 focus:ring-indigo-500 outline-none disabled:opacity-50 text-sm"
          placeholder="Ask your local AI anything..."></textarea>
        <button @click="run" :disabled="!isReady||busy||!prompt.trim()"
          class="w-full mt-3 grad text-white font-bold py-3 rounded-xl hover:opacity-90 active:scale-[.98] transition-all disabled:opacity-30 disabled:grayscale flex justify-center items-center gap-2 text-sm">
          <span v-if="busy" class="loader"></span>
          {{busy?'Computing...':'Run Local Inference'}}
        </button>
      </div>
      <div v-if="output" class="border-t border-slate-800 p-5">
        <div class="flex items-center gap-2 mb-2">
          <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
          <span class="text-[10px] font-bold text-slate-400 uppercase">Response</span>
        </div>
        <p class="text-slate-300 text-sm leading-relaxed whitespace-pre-wrap">{{output}}</p>
        <div class="mt-3 pt-3 border-t border-slate-800/50 flex justify-between text-[10px] text-slate-600 font-mono">
          <span>Inference: {{timing}}</span><span>100% On-Device</span>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { createApp, reactive } from 'https://unpkg.com/petite-vue@0.4.1/dist/petite-vue.es.js';
    import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.4.0';

    env.allowLocalModels = false;

    const groups = [
      {
        label: '⚡ Ultra Light — runs everywhere',
        models: [
          { id: 'Xenova/distilgpt2', name: 'DistilGPT2 (82M) — text completion', task: 'text-generation', chat: false },
          { id: 'HuggingFaceTB/SmolLM2-135M-Instruct', name: 'SmolLM2 135M — instruct', task: 'text-generation', chat: true },
        ]
      },
      {
        label: '⚖️ Balanced — mid-range devices',
        models: [
          { id: 'HuggingFaceTB/SmolLM2-360M-Instruct', name: 'SmolLM2 360M — instruct', task: 'text-generation', chat: true },
          { id: 'HuggingFaceTB/SmolLM2-1.7B-Instruct', name: 'SmolLM2 1.7B — instruct', task: 'text-generation', chat: true },
          { id: 'Xenova/TinyLlama-1.1B-Chat-v1.0', name: 'TinyLlama 1.1B — chat (webgpu/wasm)', task: 'text-generation', chat: true, gpu: true },
        ]
      },
      {
        label: '🧠 High Power — WASM (CPU Heavy)',
        models: [
          { id: 'Xenova/Qwen2.5-0.5B-Instruct', name: 'Qwen 2.5 0.5B', task: 'text-generation', chat: true },
          { id: 'Xenova/Qwen2.5-1.5B-Instruct', name: 'Qwen 2.5 1.5B', task: 'text-generation', chat: true },
          { id: 'onnx-community/Llama-3.2-1B-Instruct', name: 'Llama 3.2 1B', task: 'text-generation', chat: true },
          { id: 'onnx-community/Llama-3.2-3B-Instruct', name: 'Llama 3.2 3B', task: 'text-generation', chat: true },
          { id: 'Xenova/Phi-3.5-mini-instruct', name: 'Phi 3.5 Mini (3.8B)', task: 'text-generation', chat: true },
          { id: 'Xenova/gemma-2b-it', name: 'Gemma 2B', task: 'text-generation', chat: true },
        ]
      },
      {
        label: '🧩 Embeddings',
        models: [
          { id: 'Xenova/all-MiniLM-L6-v2', name: 'MiniLM L6 — embeddings', task: 'feature-extraction', chat: false },
          { id: 'Xenova/bge-small-en-v1.5', name: 'BGE Small — embeddings', task: 'feature-extraction', chat: false },
        ]
      }
    ];

    const allModels = groups.flatMap(g => g.models);

    const state = reactive({
      groups,
      sel: '',
      cores: navigator.hardwareConcurrency || '?',
      device: 'wasm',
      isReady: false,
      loading: false,
      busy: false,
      pct: 0,
      status: 'Warming up...',
      error: null,
      prompt: '',
      output: '',
      timing: '',
      gen: null,
      storageUsed: 'Checking...',

      async checkStorage() {
        if (navigator.storage && navigator.storage.estimate) {
          const est = await navigator.storage.estimate();
          const mb = (est.usage / (1024 * 1024)).toFixed(1);
          this.storageUsed = mb > 1000 ? (mb / 1024).toFixed(2) + ' GB' : mb + ' MB';
        } else {
          this.storageUsed = 'N/A';
        }
      },

      async clearCache() {
        if (!confirm('Delete all downloaded AI models? This frees up disk space but requires re-downloading next time.')) return;
        try {
          const keys = await caches.keys();
          for (const key of keys) {
            if (key.includes('transformers')) {
              await caches.delete(key);
            }
          }
          await this.checkStorage();
          alert('Cache cleared successfully!');
        } catch(e) {
          alert('Failed to clear cache: ' + e.message);
        }
      },

      currentModel() { return allModels.find(x => x.id === this.sel); },

      async initPipeline(model, deviceName, dtypeOverride) {
        const cfg = {
          device: deviceName,
          progress_callback: d => {
            if (d.status === 'progress') {
              this.pct = Math.round(d.progress ?? 0);
              this.status = `Fetching: ${(d.file || '').split('/').pop()}`;
            } else if (d.status === 'ready') {
              this.status = 'Ready';
              this.pct = 100;
              this.checkStorage();
            }
          }
        };
        if (dtypeOverride) cfg.dtype = dtypeOverride;
        return await pipeline(model.task, model.id, cfg);
      },

      async load() {
        this.isReady = false;
        this.loading = true;
        this.error = null;
        this.pct = 0;
        this.output = '';

        const m = this.currentModel();
        if (!m) { this.error = 'Unknown model.'; this.loading = false; return; }

        if (this.gen) { try { await this.gen.dispose(); } catch (_) { } this.gen = null; }

        this.device = m.gpu ? 'webgpu' : 'wasm';
        this.status = 'Warming up...';

        try {
          // First attempt (WebGPU if specified)
          this.gen = await this.initPipeline(m, this.device, m.gpu ? 'q4f16' : null);
          this.isReady = true;
        } catch (e) {
          console.warn("Pipeline initialization failed:", e.message);

          // Automatic Fallback Strategy: If WebGPU fails (due to GQA do_rotary or other unsupported ops), try WASM
          if (this.device === 'webgpu') {
            this.status = 'WebGPU unsupported. Falling back to WASM...';
            this.device = 'wasm';
            this.pct = 0;
            try {
              this.gen = await this.initPipeline(m, 'wasm', null);
              this.isReady = true;
            } catch (fallbackError) {
              this.error = fallbackError.message;
            }
          } else {
            this.error = e.message;
          }
        } finally {
          this.loading = false;
        }
      },

      async _generate(m) {
        if (m.task === 'feature-extraction') {
          const res = await this.gen(this.prompt, { pooling: 'mean', normalize: true });
          const arr = Array.from(res.data).slice(0, 8).map(v => v.toFixed(4));
          this.output = `Embedding (first 8 of ${res.data.length} dims):\n[${arr.join(', ')}, ...]`;
        } else if (m.chat) {
          const res = await this.gen(
            [
              { role: 'system', content: 'You are a concise, helpful AI assistant running entirely in the browser.' },
              { role: 'user', content: this.prompt }
            ],
            { max_new_tokens: 200, temperature: 0.7, do_sample: true }
          );
          const gen = res[0].generated_text;
          this.output = Array.isArray(gen) ? gen.at(-1).content : gen;
        } else {
          const res = await this.gen(this.prompt, { max_new_tokens: 100, temperature: 0.7, do_sample: true });
          this.output = res[0].generated_text;
        }
      },

      async run() {
        if (!this.prompt.trim() || !this.gen) return;
        this.busy = true;
        this.output = '';
        const t0 = performance.now();
        const m = this.currentModel();

        try {
          await this._generate(m);
        } catch (e) {
          console.warn("Generation failed:", e.message);
          this.output = 'Error: ' + e.message;
        } finally {
          this.timing = `${Math.round(performance.now() - t0)}ms`;
          this.busy = false;
        }
      }
    });

    state.checkStorage();
    createApp(state).mount('#app');
  </script>
</body>

</html>
