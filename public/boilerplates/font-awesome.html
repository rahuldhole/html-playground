<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Font Awesome Icon Showcase</title>
    <!-- Font Awesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" href="https://cdn.jsdelivr.net/npm/simple-icons@v9/icons/fontawesome.svg">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .icon-card:hover i { transform: scale(1.1); color: #4f46e5; }
        .icon-card:hover { border-color: #4f46e5; background: #f5f3ff; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen p-8">
    <div class="max-w-4xl mx-auto space-y-12">
        
        <header class="text-center space-y-4">
            <div class="inline-flex items-center justify-center p-4 bg-indigo-600 text-white rounded-3xl shadow-2xl shadow-indigo-200 mb-4">
                <i class="fa-solid fa-flag fa-2x"></i>
            </div>
            <h1 class="text-4xl font-extrabold tracking-tight">Font Awesome 6</h1>
            <p class="text-slate-500 text-lg max-w-xl mx-auto">The web's most popular icon set and toolkit. Use thousands of icons in your projects with ease.</p>
        </header>

        <!-- Categories -->
        <section class="grid grid-cols-2 md:grid-cols-4 gap-4">
            <div class="icon-card bg-white p-8 rounded-3xl border border-slate-100 shadow-sm transition-all flex flex-col items-center gap-4 cursor-pointer">
                <i class="fa-solid fa-house fa-2xl text-slate-300 transition-all"></i>
                <span class="text-sm font-bold text-slate-400 uppercase tracking-widest">Solid</span>
            </div>
            <div class="icon-card bg-white p-8 rounded-3xl border border-slate-100 shadow-sm transition-all flex flex-col items-center gap-4 cursor-pointer">
                <i class="fa-regular fa-user fa-2xl text-slate-300 transition-all"></i>
                <span class="text-sm font-bold text-slate-400 uppercase tracking-widest">Regular</span>
            </div>
            <div class="icon-card bg-white p-8 rounded-3xl border border-slate-100 shadow-sm transition-all flex flex-col items-center gap-4 cursor-pointer">
                <i class="fa-brands fa-github fa-2xl text-slate-300 transition-all"></i>
                <span class="text-sm font-bold text-slate-400 uppercase tracking-widest">Brands</span>
            </div>
            <div class="icon-card bg-white p-8 rounded-3xl border border-slate-100 shadow-sm transition-all flex flex-col items-center gap-4 cursor-pointer">
                <i class="fa-solid fa-bolt fa-2xl text-slate-300 transition-all"></i>
                <span class="text-sm font-bold text-slate-400 uppercase tracking-widest">Free</span>
            </div>
        </section>

        <!-- Advanced Features -->
        <section class="bg-white p-10 rounded-[3rem] border border-slate-100 shadow-sm space-y-10">
            <h2 class="text-2xl font-bold border-b border-slate-50 pb-6">Power Utilities</h2>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-12">
                <!-- Sizes -->
                <div class="space-y-6">
                    <h3 class="text-sm font-bold text-slate-400 uppercase tracking-widest">Dynamic Sizing</h3>
                    <div class="flex items-end gap-6 text-indigo-600">
                        <i class="fa-solid fa-coffee fa-xs"></i>
                        <i class="fa-solid fa-coffee fa-sm"></i>
                        <i class="fa-solid fa-coffee fa-lg"></i>
                        <i class="fa-solid fa-coffee fa-2x"></i>
                        <i class="fa-solid fa-coffee fa-3x"></i>
                    </div>
                </div>
                
                <!-- Animation -->
                <div class="space-y-6">
                    <h3 class="text-sm font-bold text-slate-400 uppercase tracking-widest">Built-in Animation</h3>
                    <div class="flex items-center gap-8 text-slate-700">
                        <div class="flex flex-col items-center gap-2">
                            <i class="fa-solid fa-spinner fa-spin fa-2x text-indigo-500"></i>
                            <span class="text-[10px] font-bold text-slate-300">SPIN</span>
                        </div>
                        <div class="flex flex-col items-center gap-2">
                            <i class="fa-solid fa-circle-notch fa-spin fa-2x text-blue-500"></i>
                            <span class="text-[10px] font-bold text-slate-300">NOTCH</span>
                        </div>
                        <div class="flex flex-col items-center gap-2">
                            <i class="fa-solid fa-sync fa-spin fa-2x text-purple-500"></i>
                            <span class="text-[10px] font-bold text-slate-300">SYNC</span>
                        </div>
                    </div>
                </div>

                <!-- Layering & Stacking -->
                <div class="space-y-6 col-span-full">
                    <h3 class="text-sm font-bold text-slate-400 uppercase tracking-widest">Layering & Masks</h3>
                    <div class="fa-4x">
                        <span class="fa-layers fa-fw">
                            <i class="fa-solid fa-circle text-indigo-500"></i>
                            <i class="fa-inverse fa-solid fa-times" data-fa-transform="shrink-6"></i>
                        </span>
                        <span class="fa-layers fa-fw">
                            <i class="fa-solid fa-bookmark text-amber-500"></i>
                            <i class="fa-solid fa-heart text-white" data-fa-transform="shrink-10 up-2" style="color:white"></i>
                        </span>
                    </div>
                </div>
            </div>
        </section>

        <!-- Script Info -->
        <footer class="text-center">
            <div class="inline-flex items-center gap-3 bg-slate-900 text-slate-400 px-6 py-3 rounded-2xl text-sm font-mono border border-white/5">
                <span class="w-2 h-2 bg-indigo-500 rounded-full animate-pulse"></span>
                v6.4.0 Loaded via CDN
            </div>
        </footer>

    </div>
</body>
</html>
