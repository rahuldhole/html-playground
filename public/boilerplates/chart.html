<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chart.js Premium Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" href="https://cdn.jsdelivr.net/npm/simple-icons@v9/icons/chartjs.svg">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen p-6 md:p-12">
    
    <div class="max-w-6xl mx-auto space-y-10">
        
        <header class="flex flex-col md:flex-row items-center justify-between gap-6">
            <div class="flex items-center gap-4">
                <div class="w-14 h-14 bg-indigo-600 rounded-2xl flex items-center justify-center shadow-2xl shadow-indigo-200">
                    <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 3.055A9.001 9.001 0 1020.945 13H11V3.055z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.488 9H15V3.512A9.025 9.025 0 0120.488 9z"></path></svg>
                </div>
                <div>
                    <h1 class="text-3xl font-extrabold tracking-tight">Analytics Dashboard</h1>
                    <p class="text-slate-500 font-medium text-sm">Powered by Chart.js 4.0</p>
                </div>
            </div>
            <div class="flex gap-2">
                <button class="px-5 py-2.5 bg-white border border-slate-200 rounded-xl font-bold text-sm shadow-sm hover:bg-slate-50 transition">Export PDF</button>
                <button class="px-5 py-2.5 bg-indigo-600 text-white rounded-xl font-bold text-sm shadow-lg shadow-indigo-100 hover:bg-indigo-700 transition">Add Widget</button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Line Chart (Wide) -->
            <div class="lg:col-span-2 bg-white p-8 rounded-[3rem] border border-slate-100 shadow-sm space-y-6">
                <div class="flex items-center justify-between">
                    <h2 class="text-xl font-bold tracking-tight">Revenue Over Time</h2>
                    <select class="bg-slate-50 border-none rounded-xl text-xs font-bold px-4 py-2">
                        <option>Last 30 Days</option>
                        <option>Last 6 Months</option>
                    </select>
                </div>
                <div class="h-[300px]">
                    <canvas id="mainChart"></canvas>
                </div>
            </div>

            <!-- Stats Column -->
            <div class="space-y-6">
                <div class="bg-indigo-600 p-8 rounded-[3rem] text-white space-y-2 shadow-2xl shadow-indigo-100">
                    <p class="text-indigo-200 text-xs font-bold uppercase tracking-widest">Total Sales</p>
                    <h3 class="text-4xl font-extrabold tracking-tight">$84,232</h3>
                    <div class="flex items-center gap-1 text-xs font-bold text-green-300">
                        <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M12 7a1 1 0 110-2h5a1 1 0 011 1v5a1 1 0 11-2 0V8.414l-4.293 4.293a1 1 0 01-1.414 0L8 10.414l-4.293 4.293a1 1 0 01-1.414-1.414l5-5a1 1 0 011.414 0L11 10.586 14.586 7H12z" clip-rule="evenodd"></path></svg>
                        12.5% vs LW
                    </div>
                </div>
                <div class="bg-white p-8 rounded-[3rem] border border-slate-100 shadow-sm space-y-6">
                    <h2 class="text-lg font-bold">Category Split</h2>
                    <div class="h-[180px]">
                        <canvas id="donutChart"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
            <div class="bg-white p-6 rounded-[2rem] border border-slate-100 shadow-sm flex items-center gap-4">
                <div class="p-3 bg-blue-50 text-blue-600 rounded-2xl"><i class="bi bi-people-fill text-xl"></i></div>
                <div><p class="text-[10px] font-bold text-slate-400 uppercase">Users</p><p class="text-xl font-bold">12.4k</p></div>
            </div>
            <div class="bg-white p-6 rounded-[2rem] border border-slate-100 shadow-sm flex items-center gap-4">
                <div class="p-3 bg-green-50 text-green-600 rounded-2xl"><i class="bi bi-cart-fill text-xl"></i></div>
                <div><p class="text-[10px] font-bold text-slate-400 uppercase">Orders</p><p class="text-xl font-bold">1,842</p></div>
            </div>
            <div class="bg-white p-6 rounded-[2rem] border border-slate-100 shadow-sm flex items-center gap-4">
                <div class="p-3 bg-purple-50 text-purple-600 rounded-2xl"><i class="bi bi-graph-up text-xl"></i></div>
                <div><p class="text-[10px] font-bold text-slate-400 uppercase">Growth</p><p class="text-xl font-bold">+24%</p></div>
            </div>
            <div class="bg-white p-6 rounded-[2rem] border border-slate-100 shadow-sm flex items-center gap-4">
                <div class="p-3 bg-orange-50 text-orange-600 rounded-2xl"><i class="bi bi-clock-fill text-xl"></i></div>
                <div><p class="text-[10px] font-bold text-slate-400 uppercase">Session</p><p class="text-xl font-bold">4m 32s</p></div>
            </div>
        </div>

    </div>

    <script>
        // Line Chart
        const ctx = document.getElementById('mainChart').getContext('2d');
        const gradient = ctx.createLinearGradient(0, 0, 0, 400);
        gradient.addColorStop(0, 'rgba(79, 70, 229, 0.2)');
        gradient.addColorStop(1, 'rgba(79, 70, 229, 0)');

        new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
                datasets: [{
                    label: 'Revenue',
                    data: [12000, 19000, 15000, 25000, 22000, 30000, 28000],
                    borderColor: '#4f46e5',
                    borderWidth: 4,
                    pointBackgroundColor: '#fff',
                    pointBorderColor: '#4f46e5',
                    pointBorderWidth: 2,
                    pointRadius: 6,
                    pointHoverRadius: 8,
                    fill: true,
                    backgroundColor: gradient,
                    tension: 0.4
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    x: { grid: { display: false }, border: { display: false } },
                    y: { grid: { color: '#f1f5f9' }, border: { display: false }, ticks: { stepSize: 10000 } }
                }
            }
        });

        // Donut Chart
        new Chart(document.getElementById('donutChart'), {
            type: 'doughnut',
            data: {
                labels: ['Electronics', 'Fashion', 'Home'],
                datasets: [{
                    data: [45, 35, 20],
                    backgroundColor: ['#4f46e5', '#818cf8', '#e2e8f0'],
                    borderWidth: 0,
                    hoverOffset: 10
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                cutout: '75%'
            }
        });
    </script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</body>
</html>
