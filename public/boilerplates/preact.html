<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preact Fast & Light Demo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" href="https://cdn.jsdelivr.net/npm/simple-icons@v9/icons/preact.svg">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap');
        body { font-family: 'Outfit', sans-serif; }
        .preact-gradient { background: linear-gradient(135deg, #673ab8 0%, #311b92 100%); }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">
    <div id="app"></div>

    <!-- Preact from ESM -->
    <script type="module">
        import { h, render } from 'https://esm.sh/preact';
        import { useState, useEffect } from 'https://esm.sh/preact/hooks';
        import htm from 'https://esm.sh/htm';

        // Initialize htm with Preact
        const html = htm.bind(h);

        function App() {
            const [count, setCount] = useState(0);
            const [todos, setTodos] = useState(['Learn Preact', 'Build something fast', 'Optimize for performance']);
            const [inputValue, setInputValue] = useState('');

            const addTodo = () => {
                if (inputValue.trim()) {
                    setTodos([...todos, inputValue]);
                    setInputValue('');
                }
            };

            return html`
                <div class="min-h-screen p-6 md:p-12">
                    <div class="max-w-4xl mx-auto space-y-12">
                        
                        <header class="text-center space-y-4">
                            <div class="inline-flex items-center justify-center p-4 preact-gradient text-white rounded-3xl shadow-2xl shadow-indigo-200 mb-4 animate-pulse">
                                <svg class="w-10 h-10" fill="currentColor" viewBox="0 0 24 24"><path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm0 2c5.523 0 10 4.477 10 10s-4.477 10-10 10S2 17.523 2 12 6.477 2 12 2zm0 2.5c-4.142 0-7.5 3.358-7.5 7.5s3.358 7.5 7.5 7.5 7.5-3.358 7.5-7.5-3.358-7.5-7.5-7.5zm0 1.5c3.314 0 6 2.686 6 6s-2.686 6-6 6-6-2.686-6-6 2.686-6 6-6z"/></svg>
                            </div>
                            <h1 class="text-5xl font-extrabold tracking-tight">Preact Fast</h1>
                            <p class="text-slate-500 text-lg max-w-xl mx-auto">Fast 3kb alternative to React with the same modern API. All the power, none of the weight.</p>
                        </header>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                            <!-- Counter -->
                            <section class="bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-100 space-y-6">
                                <h2 class="text-xl font-bold flex items-center gap-2">
                                    <span class="p-2 bg-indigo-50 text-indigo-600 rounded-xl"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path></svg></span>
                                    Reactive State
                                </h2>
                                <div class="text-center py-8 preact-gradient rounded-3xl text-white">
                                    <span class="text-6xl font-bold">${count}</span>
                                    <p class="text-indigo-200 text-xs font-bold uppercase tracking-widest mt-2">Counter</p>
                                </div>
                                <div class="flex gap-2">
                                    <button onClick=${() => setCount(count - 1)} class="flex-1 py-4 bg-white border border-slate-200 rounded-2xl font-bold hover:bg-slate-50 transition">Decrement</button>
                                    <button onClick=${() => setCount(count + 1)} class="flex-1 py-4 preact-gradient text-white rounded-2xl font-bold hover:opacity-90 transition shadow-lg shadow-indigo-100">Increment</button>
                                </div>
                            </section>

                            <!-- Todo List -->
                            <section class="bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-100 space-y-6">
                                <h2 class="text-xl font-bold flex items-center gap-2">
                                    <span class="p-2 bg-indigo-50 text-indigo-600 rounded-xl"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path></svg></span>
                                    Fast Lists
                                </h2>
                                <div class="flex gap-2">
                                    <input value=${inputValue} onInput=${(e) => setInputValue(e.target.value)} type="text" placeholder="Add task..." class="flex-1 px-6 py-3 bg-slate-50 rounded-2xl border-none focus:ring-2 focus:ring-indigo-500" />
                                    <button onClick=${addTodo} class="p-3 bg-indigo-600 text-white rounded-2xl shadow-lg hover:bg-indigo-700 transition">
                                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                                    </button>
                                </div>
                                <ul class="space-y-2 max-h-40 overflow-y-auto">
                                    ${todos.map(todo => html`
                                        <li class="p-4 bg-slate-50 rounded-2xl text-sm font-medium flex items-center justify-between group">
                                            ${todo}
                                            <span class="w-2 h-2 bg-indigo-400 rounded-full group-hover:scale-150 transition"></span>
                                        </li>
                                    `)}
                                </ul>
                            </section>
                        </div>

                        <footer class="text-center">
                            <div class="inline-block px-6 py-3 bg-slate-900 text-slate-400 rounded-full text-xs font-mono border border-white/5">
                                import { h, render } from 'https://esm.sh/preact'
                            </div>
                        </footer>

                    </div>
                </div>
            `;
        }

        render(html`<${App} />`, document.getElementById('app'));
    </script>
</body>
</html>
