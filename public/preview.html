<script>
  const code = localStorage.getItem('preview-code');
  if (code) {
    document.open();
    document.write(code);
    document.close();
  } else {
    document.write('<div style="font-family: sans-serif; padding: 2rem; text-align: center;"><h1>No content available</h1><p>Please run the code from the editor to view the preview.</p><a href="/" style="margin-top: 1rem; display: inline-block; color: blue;">Return to Home</a></div>');
  }
</script>
